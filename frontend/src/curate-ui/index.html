<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Manager — Curate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2e2e38;
      --accent: #22c55e;
      --accent-dim: #16a34a;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .group-counter {
      font-weight: 600;
      font-size: 15px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    .btn-skip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-confirm {
      background: var(--accent);
      color: #000;
    }
    .btn-confirm:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── Photo grid ─────────────────────────────────────────────────────── */
    #photo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 20px;
      flex: 1;
      align-content: flex-start;
    }

    .photo-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      flex: 1 1 260px;
      max-width: 380px;
      display: flex;
      flex-direction: column;
    }
    .photo-card:hover { border-color: #52525b; }
    .photo-card.keeper {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    .photo-img-wrap {
      position: relative;
      aspect-ratio: 4/3;
      background: #111;
      overflow: hidden;
    }

    .photo-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .keep-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      background: var(--accent);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      display: none;
    }
    .photo-card.keeper .keep-badge { display: block; }

    .photo-meta {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .photo-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .photo-details {
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ── Loading / empty states ─────────────────────────────────────────── */
    #loading, #done-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      font-size: 16px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div id="loading">Connecting…</div>

  <header id="header" style="display:none">
    <span class="group-counter" id="group-counter"></span>
    <div class="header-actions">
      <button class="btn-skip" id="btn-skip">Skip group</button>
      <button class="btn-confirm" id="btn-confirm" disabled>Confirm keeper</button>
    </div>
  </header>

  <div id="photo-grid" style="display:none"></div>
  <div id="done-msg" style="display:none">All groups reviewed. You can close this window.</div>

  <script type="module" src="./app.js"></script>
</body>
</html>
